name: CI

# The automated form of the Definition of Done: every PR and every push to main
# must pass the same gates a developer runs locally (typecheck · lint · test ·
# build), plus the critical e2e journeys. A red gate blocks the merge.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref so a force-push doesn't pile up runners.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: CI only needs to read the repo.
permissions:
  contents: read

jobs:
  quality:
    name: Typecheck · Lint · Test · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit & component tests
        run: npm run test

      - name: Production build
        run: npm run build
        env:
          # Deterministic canonical origin for the SSG/metadata build.
          NEXT_PUBLIC_SITE_URL: https://readeasily.app

  audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Fail the build only on high/critical CVEs. Moderate/low are reported but
      # don't block — today the only advisories are moderate and live in a
      # transitive dep pinned by Next (postcss via next), unfixable without a
      # breaking Next downgrade. Dependabot (.github/dependabot.yml) raises the
      # upgrade PRs; this gate stops a genuinely exploitable CVE from landing.
      - name: npm audit (high+)
        run: npm audit --audit-level=high

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser (chromium)
        run: npx playwright install --with-deps chromium

      - name: Run e2e journeys
        run: npm run e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
